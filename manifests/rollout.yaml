apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/nicupolonicu/go-simple-webserver@sha256:4db8abfb28a72ef0d48fee71da9a302378c306d7aec61139d09d168adaf4f5a0
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
